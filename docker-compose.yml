version: "3.9"

services:
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "coolify.managed=true"

  promtail:
    image: grafana/promtail:2.9.0
    ports:
      - "9080:9080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "coolify.managed=true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/promtail/config.yaml <<'EOF'
        server:
          http_listen_port: 9080
          grpc_listen_port: 0
        positions:
          filename: /tmp/positions.yaml
        clients:
          - url: http://loki:3100/loki/api/v1/push
        scrape_configs:
          - job_name: docker
            docker_sd_configs:
              - host: unix:///var/run/docker.sock
                refresh_interval: 5s
            relabel_configs:
              - source_labels: ['__meta_docker_container_name']
                regex: '/(.*)'
                target_label: 'container'
              - source_labels: ['__meta_docker_container_id']
                target_label: 'container_id'
              - source_labels: ['__meta_docker_container_image']
                target_label: 'image'
              - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
                target_label: 'compose_project'
              - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
                target_label: 'compose_service'
              - source_labels: ['__meta_docker_container_label_coolify_application_id']
                target_label: 'coolify_app_id'
              - source_labels: ['__meta_docker_container_label_coolify_application_name']
                target_label: 'coolify_app_name'
              - source_labels: ['__meta_docker_container_label_coolify_project_id']
                target_label: 'coolify_project_id'
            pipeline_stages:
              - multiline:
                  firstline: '^\[\d{4}-\d{2}-\d{2}'
                  max_wait_time: 3s
              - regex:
                  expression: '^\[(?P<timestamp>\d{4}-\d{2}-\d{2}[^\]]+)\]\s+(?P<environment>\w+)\.(?P<level>\w+):\s+(?P<message>.*)'
              - labels:
                  level:
                  environment:
              - timestamp:
                  source: timestamp
                  format: '2006-01-02 15:04:05'
        EOF
        /usr/bin/promtail -config.file=/etc/promtail/config.yaml

  grafana:
    image: grafana/grafana:10.4.5
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ENFORCE_DOMAIN=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "coolify.managed=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat > /etc/grafana/provisioning/datasources/datasources.yaml <<'EOF'
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki:3100
            isDefault: true
            editable: true
            jsonData:
              maxLines: 1000
        EOF
        /run.sh

volumes:
  loki-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
